name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-policy:
    name: Branch policy
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch naming
        shell: bash
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          if [[ "$branch" =~ ^(main|develop)$ || "$branch" =~ ^(feature|release|hotfix)/[a-z0-9._-]+$ ]]; then
            exit 0
          fi
          echo "Invalid branch name: $branch"
          echo "Use main, develop, feature/*, release/* or hotfix/*."
          exit 1

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: ./mvnw -B test

  docker:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t statuszap-api:ci apps/backend
      - name: Build frontend image
        run: docker build -t statuszap-web:ci apps/frontend
      - name: Validate compose files
        run: |
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose.prod.yml config
