services:
  db:
    image: postgres:16-alpine
    container_name: servico-rapido-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: app123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: servico-rapido-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/appdb
      DB_USER: appuser
      DB_PASS: app123
      JWT_SECRET: ${JWT_SECRET}
      FRONT_URL: ${FRONT_URL:-http://localhost:5173}
      DDL_AUTO: update
      SHOW_SQL: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
