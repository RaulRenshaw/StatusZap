server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/appdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:appuser}
    password: ${DB_PASS:app123}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${DDL_AUTO:create}
    show-sql: ${SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    default-property-inclusion: non_null
    deserialization:
      FAIL_ON_UNKNOWN_PROPERTIES: false

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:2MB}
      max-request-size: ${MAX_REQUEST_SIZE:2MB}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

cors:
  allowed-origins:
    - ${FRONT_URL:http://localhost:4200}
    - ${API_URL:http://localhost:8080}

storage:
  local:
    base-dir: ${STORAGE_DIR:uploads}
    base-url: ${STORAGE_URL:http://localhost:8080/uploads}

mercado-pago:
  enabled: ${MP_ENABLED:false}
  sandbox: ${MP_SANDBOX:true}
  access-token: ${MP_ACCESS_TOKEN:}
  public-key: ${MP_PUBLIC_KEY:}
  webhook-secret: ${MP_WEBHOOK_SECRET:}
  base-url: ${MP_BASE_URL:https://api.mercadopago.com}
  plan-code: ${MP_PLAN_CODE:premium_monthly}
  plan-reason: ${MP_PLAN_REASON:Assinatura Premium Mensal}
  amount: ${MP_AMOUNT:29.00}
  currency: ${MP_CURRENCY:BRL}
  back-url: ${MP_BACK_URL:http://localhost:5173/billing/mercado-pago}
  notification-url: ${MP_NOTIFICATION_URL:}
